<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétanque Pro – Admin</title>
<style>
  :root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--border:#252a38;--accent:#6366f1;--accent2:#818cf8;--gold:#f59e0b;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
  ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  
  /* LOGIN & UI COMPONENTS */
  .login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
  .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:1rem;padding:2.5rem;width:100%;max-width:360px;display:flex;flex-direction:column;gap:1.25rem;}
  .login-logo{font-size:1.4rem;font-weight:900;color:var(--accent2);text-align:center;}
  .login-logo span{color:var(--gold);}
  .login-subtitle{text-align:center;color:var(--muted);font-size:0.85rem;margin-top:-0.75rem;}
  .login-field{display:flex;flex-direction:column;gap:0.4rem;}
  .login-field label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
  .login-field input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:0.5rem;padding:0.65rem 0.85rem;font-size:0.95rem;outline:none;transition:border 0.15s;}
  .login-field input:focus{border-color:var(--accent);}
  .login-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red);font-size:0.8rem;padding:0.5rem 0.75rem;border-radius:0.4rem;text-align:center;display:none;}
  .login-error.show{display:block;}
  .btn-login{background:var(--accent);color:#fff;border:none;border-radius:0.5rem;padding:0.75rem;font-size:0.95rem;font-weight:700;cursor:pointer;}
  .btn-login:hover{background:var(--accent2);}

  /* APP STRUCTURE */
  .app{display:flex;min-height:100vh;}
  .sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;gap:0.5rem;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .main{flex:1;padding:2rem;overflow-x:hidden;}
  @media(max-width:900px){.sidebar{display:none;}}
  .sidebar-logo{font-size:1.1rem;font-weight:900;color:var(--accent2);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
  .sidebar-logo span{color:var(--gold);}
  .nav-item{display:flex;align-items:center;gap:0.6rem;padding:0.55rem 0.75rem;border-radius:0.5rem;font-size:0.85rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(99,102,241,0.15);color:var(--accent2);}
  .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
  .nav-item.active .nav-dot{background:var(--accent);}
  .nav-section{font-size:0.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:1rem 0 0.3rem 0.75rem;}
  .sidebar-footer{margin-top:auto;}
  .btn-logout{width:100%;background:none;border:1px solid var(--border);color:var(--muted);border-radius:0.5rem;padding:0.45rem;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}

  /* TABLES & CARDS */
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:0.75rem;padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,0.4);margin-bottom:1.5rem;}
  .card-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:1rem;}
  .setup-grid{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;}
  @media(max-width:900px){.setup-grid{grid-template-columns:1fr;}}
  .input-row{display:flex;gap:0.5rem;margin-bottom:0.75rem;}
  input[type="text"],input[type="number"],input[type="password"],select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:0.5rem;padding:0.55rem 0.75rem;font-size:0.9rem;outline:none;transition:border 0.15s;}
  .btn{padding:0.55rem 1.1rem;border-radius:0.5rem;font-weight:700;font-size:0.85rem;border:none;cursor:pointer;transition:all 0.15s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-success{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
  .btn-danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
  .btn-gold{background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3);}
  .btn-xl{padding:1rem 2rem;font-size:1rem;border-radius:0.75rem;width:100%;margin-top:1rem;letter-spacing:0.05em;}

  .format-picker{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
  .format-card{background:var(--bg3);border:2px solid var(--border);border-radius:0.75rem;padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative;}
  .format-card.selected{border-color:var(--accent);background:rgba(99,102,241,0.08);}
  .format-card input[type="radio"]{position:absolute;opacity:0;}

  .bottom-bar{position:fixed;bottom:0;left:220px;right:0;background:rgba(13,15,20,0.9);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:0.75rem 2rem;display:flex;gap:1rem;justify-content:flex-end;z-index:100;}
  @media(max-width:900px){.bottom-bar{left:0;}}
  .hidden{display:none!important;}

  /* ─────────────── PRINT OPTIMIZATION ─────────────── */
  #print-view-container { display: none; }

  @media print {
    /* Hide everything that isn't the print container */
    body { background: white !important; color: black !important; }
    .sidebar, .bottom-bar, .no-print, .login-overlay, .modal-overlay, #setup-section, #active-leagues-section { 
        display: none !important; 
    }
    .app { display: block !important; }
    .main { padding: 0 !important; }
    
    #print-view-container { 
        display: block !important; 
        color: black !important;
    }

    .print-page { 
        padding: 40px; 
        page-break-after: always; 
        background: white;
    }
    
    .print-round { 
        margin-bottom: 30px; 
        border: 1px solid #000;
        border-radius: 8px;
        overflow: hidden;
    }
    
    .print-round-header {
        background: #f0f0f0;
        padding: 10px;
        font-weight: bold;
        border-bottom: 1px solid #000;
        text-transform: uppercase;
        font-size: 14px;
    }

    .print-match { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 12px; 
        border-bottom: 1px solid #eee; 
    }
    .print-match:last-child { border-bottom: none; }

    .print-team { font-weight: bold; width: 35%; font-size: 16px; }
    .print-score-area { flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .print-score-box { 
        width: 35px; height: 35px; border: 2px solid black; 
        display: inline-block; vertical-align: middle; 
    }
    .print-vs { font-size: 12px; color: #666; font-weight: bold; margin: 0 10px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-logo">Pétanque <span>Pro</span></div>
    <p class="login-subtitle">Adminåtkomst krävs</p>
    <div class="login-field">
      <label>Användarnamn</label>
      <input type="text" id="login-user" value="admin">
    </div>
    <div class="login-field">
      <label>Lösenord</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <div class="login-error" id="login-error">Fel uppgifter.</div>
    <button class="btn-login" onclick="tryLogin()">Logga in</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <nav class="sidebar no-print">
    <div class="sidebar-logo">Pétanque <span>Pro</span></div>
    <div class="nav-item active" onclick="showSection('setup')"><div class="nav-dot"></div> Inställningar</div>
    <div id="nav-divisions-header" class="nav-section hidden">Divisioner</div>
    <div id="nav-divisions"></div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">Logga ut</button>
    </div>
  </nav>

  <main class="main">
    <!-- PRINT VIEW (Only visible in print mode) -->
    <div id="print-view-container"></div>

    <!-- SETUP SECTION -->
    <div id="setup-section">
      <div class="page-header">
        <h1>Sätt upp seriespel</h1>
        <p>Välj format och hantera divisioner.</p>
      </div>

      <div class="card">
        <div class="card-title">Spelformat</div>
        <div class="format-picker">
          <label class="format-card selected" id="fc-sets" onclick="setFormat('sets')">
            <input type="radio" name="fmt" checked> 🎯 Set-format
          </label>
          <label class="format-card" id="fc-simple" onclick="setFormat('simple')">
            <input type="radio" name="fmt"> ⚡ Enkelt resultat
          </label>
        </div>
      </div>

      <div class="setup-grid">
        <div class="card">
          <div class="card-title">Divisioner</div>
          <div class="input-row">
            <input type="text" id="div-input" placeholder="Namn">
            <button class="btn btn-primary" onclick="addDivision()">Skapa</button>
          </div>
          <div id="div-list"></div>
        </div>
        <div class="card">
          <div class="card-title">Lägg till lag</div>
          <div class="input-row">
            <input type="text" id="team-input" placeholder="Lagnamn">
            <select id="div-select"><option value="">Välj division...</option></select>
            <button class="btn btn-success" onclick="addTeam()">Lägg till</button>
          </div>
          <div id="division-preview"></div>
          <button class="btn btn-primary btn-xl hidden" id="start-btn" onclick="generateTournament()">STARTA SERIESPELET</button>
        </div>
      </div>
    </div>

    <!-- ACTIVE LEAGUE SECTION -->
    <div id="active-leagues-section" class="hidden">
        <h1 class="no-print">Aktivt Seriespel</h1>
        <div id="active-content"></div>
    </div>
  </main>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar" class="bottom-bar hidden no-print">
  <button class="btn btn-ghost" onclick="prepareAndPrint()">🖨 Skriv ut spelprogram</button>
  <button class="btn btn-danger" onclick="resetAll()">Nollställ</button>
</div>

<script>
let divisions = [];
let format = 'sets';

// ─── UTDRAG FÖR UTSKRIFT (RENA RAPPORTER) ──────────────────
function prepareAndPrint() {
    const container = document.getElementById('print-view-container');
    let html = '';
    
    divisions.forEach(div => {
        html += `<div class="print-page">
            <h1 style="margin-bottom:5px;">Spelprogram: ${div.name}</h1>
            <p style="margin-bottom:25px; border-bottom: 2px solid #000; padding-bottom: 10px;">Format: ${format === 'sets' ? 'Set-spel (3 set till 13)' : 'Enkelmatch (2p vid vinst)'}</p>`;
        
        div.rounds.forEach((round, rIdx) => {
            html += `<div class="print-round">
                <div class="print-round-header">Omgång ${rIdx + 1}</div>`;
            
            round.forEach(match => {
                html += `<div class="print-match">
                    <div class="print-team">${match.home}</div>
                    <div class="print-score-area">
                        ${format === 'sets' ? 
                            `<div class="print-score-box"></div> <span class="print-vs">-</span> <div class="print-score-box"></div> 
                             <span style="margin:0 15px">|</span>
                             <div class="print-score-box"></div> <span class="print-vs">-</span> <div class="print-score-box"></div>
                             <span style="margin:0 15px">|</span>
                             <div class="print-score-box"></div> <span class="print-vs">-</span> <div class="print-score-box"></div>` 
                            : 
                            `<div class="print-score-box"></div> <span class="print-vs">-</span> <div class="print-score-box"></div>`
                        }
                    </div>
                    <div class="print-team" style="text-align:right">${match.away}</div>
                </div>`;
            });
            html += `</div>`;
        });
        html += `</div>`;
    });

    container.innerHTML = html;
    window.print();
}

// ─── CORE LOGIC ───────────────────────────────────────────
function tryLogin() {
    if(document.getElementById('login-user').value === 'admin' && document.getElementById('login-pass').value === 'petanque123') {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
    } else {
        document.getElementById('login-error').classList.add('show');
    }
}

function setFormat(f) {
    format = f;
    document.getElementById('fc-sets').classList.toggle('selected', f==='sets');
    document.getElementById('fc-simple').classList.toggle('selected', f==='simple');
}

function addDivision() {
    const name = document.getElementById('div-input').value;
    if(!name) return;
    divisions.push({id: Date.now(), name, teams: [], rounds: []});
    document.getElementById('div-input').value = '';
    updateUI();
}

function addTeam() {
    const name = document.getElementById('team-input').value;
    const divId = parseInt(document.getElementById('div-select').value);
    if(!name || !divId) return;
    const div = divisions.find(d => d.id === divId);
    div.teams.push(name);
    document.getElementById('team-input').value = '';
    updateUI();
}

function updateUI() {
    document.getElementById('div-list').innerHTML = divisions.map(d => `<div class="btn-ghost" style="padding:10px; margin-bottom:5px; border-radius:5px">${d.name}</div>`).join('');
    document.getElementById('div-select').innerHTML = '<option value="">Välj...</option>' + divisions.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    document.getElementById('division-preview').innerHTML = divisions.map(d => `<div><strong>${d.name}:</strong> ${d.teams.join(', ')}</div>`).join('<br>');
    document.getElementById('start-btn').classList.toggle('hidden', divisions.length === 0);
}

function generateTournament() {
    divisions.forEach(div => {
        const teams = [...div.teams];
        if(teams.length % 2 !== 0) teams.push("Vilohelg");
        
        const n = teams.length;
        div.rounds = [];
        for (let j = 0; j < n - 1; j++) {
            let matches = [];
            for (let i = 0; i < n / 2; i++) {
                matches.push({ home: teams[i], away: teams[n - 1 - i] });
            }
            div.rounds.push(matches);
            teams.splice(1, 0, teams.pop());
        }
    });
    
    document.getElementById('setup-section').classList.add('hidden');
    document.getElementById('active-leagues-section').classList.remove('hidden');
    document.getElementById('bottom-bar').classList.remove('hidden');
}

function resetAll() { if(confirm("Nollställ allt?")) location.reload(); }
function logout() { location.reload(); }
</script>
</body>
</html>
